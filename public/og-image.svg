<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="78%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#1a1c2e"/>
      <stop offset="55%" stop-color="#0e1014"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orbe a la derecha -->
  <g transform="translate(930 315)">
    <circle r="260" fill="url(#glow)"/>
    <circle r="200" fill="none" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1.5"/>
    <circle r="150" fill="none" stroke="#a5b4fc" stroke-opacity="0.20" stroke-width="1.5"/>
    <circle r="105" fill="url(#orb)"/>
  </g>

  <!-- Texto -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(90 250)">
      <circle cx="16" cy="-6" r="16" fill="url(#orb)"/>
      <text x="44" y="2" font-size="34" font-weight="700" fill="#e8eaf2" letter-spacing="1">LIA</text>
    </g>
    <text x="90" y="350" font-size="74" font-weight="800" fill="#e8eaf2" letter-spacing="-1">Tu segundo cerebro</text>
    <text x="90" y="430" font-size="74" font-weight="800" fill="url(#accent)" letter-spacing="-1">de escritorio.</text>
    <text x="92" y="495" font-size="28" font-weight="500" fill="#8a8fa3">IA local · Tus notas siempre tuyas · Windows</text>
  </g>
</svg>
